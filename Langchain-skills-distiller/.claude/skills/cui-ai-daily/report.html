<!DOCTYPE html>
<html>
<head>
    <title>今日SKILL报告</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .card h2 {
            margin-top: 0;
        }
        .card p {
            margin: 10px 0;
        }
        .tag {
            background-color: #e0e0e0;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <h1>今日SKILL报告</h1>
    <div class="card">
        <h2>AI技能新闻概览</h2>
        <p>精选近24小时内的AI SKILL技能重要新闻。</p>
        <div>
            <span class="tag">AI</span>
            <span class="tag">技能</span>
            <span class="tag">新闻</span>
        </div>
    </div>
    <div class="card">
        <h2>智能摘要生成</h2>
        <p>每条资讯提炼出50-100字核心要点，标注关键词标签。</p>
        <div>
            <span class="tag">摘要</span>
            <span class="tag">关键词</span>
            <span class="tag">新闻</span>
        </div>
    </div>
    <div class="card">
        <h2>清爽界面展示</h2>
        <p>生成精美HTML页面，采用卡片式设计。</p>
        <div>
            <span class="tag">HTML</span>
            <span class="tag">设计</span>
            <span class="tag">卡片</span>
        </div>
    </div>
</body>
</html>
